spring.application.name=movie-booking

# In production, sensitive values are injected via CI/CD from a secret manager and resolved at runtime
spring.datasource.url=jdbc:mysql://localhost:3306/movie_booking
spring.datasource.username=root
spring.datasource.password=1234

# In production, schema changes are managed separately before application deployment
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.file.name=logs/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

logging.level.root=INFO
logging.level.com.xyz.movie_booking=DEBUG